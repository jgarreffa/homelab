## Datadog Agent configuration for the ups_check custom check.
## Place this file at: /etc/datadog-agent/conf.d/ups_check.yaml
##
## No NUT required — reads directly from the HID device.
##
## To find your hidraw device:
##   ls -la /dev/hidraw*
##
## To fix permissions so the Agent can read it:
##   sudo chmod a+r /dev/hidraw0
##   (or add dd-agent user to the right group)

init_config:

instances:
  - device: "/dev/hidraw0"
    tags:
      - "env:home"
      - "device:digitech-ups"
